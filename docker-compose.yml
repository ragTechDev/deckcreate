services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source code for development (exclude whisper.cpp to avoid locking)
      - .:/app:delegated
      # Persist node_modules
      - node_modules:/app/node_modules
      # Mount public directory for input/output files
      - ./public:/app/public
    ports:
      - "3000:3000"  # Next.js dev server
      - "3001:3001"  # Serve for caption test
    environment:
      - NODE_ENV=development
      - PYTHON_PATH=/usr/local/bin/python
    stdin_open: true
    tty: true
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

  # Wizard service - interactive wizard for video editing
  wizard:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - next_build:/app/.next
      - ./public:/app/public
    ports:
      - "3000:3000"  # Camera setup GUI (/camera)
      - "3001:3001"  # Caption alignment test server
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    stdin_open: true
    tty: true
    command: npm run video:wizard

  # Transcription service
  transcribe:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    command: npm run transcribe

  # Diarization service
  diarize:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    command: npm run diarize -- --num-speakers 2

  # Remotion preview service
  remotion:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    ports:
      - "8000:8000"  # Remotion Studio
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: npm run remotion

  # Camera setup service - face detection + launches /camera GUI
  setup-camera:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    ports:
      - "3000:3000"  # Camera setup GUI (/camera)
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    stdin_open: true
    tty: true
    command: npm run setup-camera

  # Color match service - per-angle colour correction into camera-profiles.json
  color-match:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    command: npm run color-match

  # Hook QA service
  hook-qa:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
    environment:
      - NODE_ENV=development
      - PYTHON_PATH=/usr/local/bin/python
    command: npm run hook-qa

  # Thumbnail generation service — extracts speaker frames + renders Remotion still
  thumbnail:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
      # Cache rembg U2Net model (~170 MB, downloaded on first run)
      - rembg_models:/root/.u2net
    environment:
      - PYTHON_PATH=/usr/local/bin/python
    stdin_open: true
    tty: true
    command: npm run thumbnail

  # Carousel generation service — creates social media carousels from transcripts
  carousel:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./public:/app/public
      - ./input:/app/input
    environment:
      - PYTHON_PATH=/usr/local/bin/python
      - DOCKER_ENV=true
    stdin_open: true
    tty: true
    working_dir: /app
    command: npm run carousel:wizard

volumes:
  node_modules:
  next_build:
  rembg_models:
